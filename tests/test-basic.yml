name: Test basic dependency check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          project: "test-project"
          path: "."
          format: "HTML"
      - name: Assert report was generated
        run: |
          echo "Checking for generated report..."
          if [ ! -d "reports" ]; then
            echo "FAIL: reports directory not found"
            exit 1
          fi
          echo "PASS: reports directory exists"
          ls -la reports/
