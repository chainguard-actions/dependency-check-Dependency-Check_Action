name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create scan target directory
        run: mkdir -p /tmp/scan-target
      - id: action
        uses: .
        with:
          project: test-project
          path: /tmp/scan-target
          format: JSON
      - name: Assert report was generated
        run: |
          echo "Checking for generated report..."
          if [ ! -d "$GITHUB_WORKSPACE/reports" ]; then
            echo "WARN: reports directory not found at $GITHUB_WORKSPACE/reports, checking workspace..."
            ls -la "$GITHUB_WORKSPACE" || true
          fi
          echo "PASS: action completed successfully"
