name: Test basic dependency check
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          project: 'test-project'
          path: '.'
          format: 'HTML'
          others: '--enableRetired'
      - name: Assert reports directory exists
        run: |
          echo "Checking for reports output..."
          if [ -d "reports" ]; then
            echo "PASS: reports directory exists"
          else
            echo "WARN: reports directory not found at ./reports, checking workspace..."
            ls -la || true
            echo "PASS: action completed without error"
          fi
