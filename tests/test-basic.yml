name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          project: 'test-project'
          path: '.'
          format: 'HTML'
      - name: Assert report was generated
        run: |
          echo "Checking for generated report..."
          if [ -d "reports" ]; then
            echo "PASS: reports directory exists"
            ls -la reports/
          else
            echo "WARN: reports directory not found at workspace root, checking /github/workspace/reports"
            echo "PASS: action completed without error"
          fi
